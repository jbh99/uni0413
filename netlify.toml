[build]
  publish = "."
  functions = "netlify/functions"

# ── Required Environment Variables (Netlify → Site settings → Environment) ──
# Firebase Web Config (서버 함수 auth-config.js에서 사용, 정적 HTML에 더 이상 노출되지 않음):
#   FIREBASE_API_KEY               (예: AIza...)
#   FIREBASE_AUTH_DOMAIN           (예: uniword-e3b0d.firebaseapp.com)
#   FIREBASE_DATABASE_URL          (예: https://uniword-e3b0d-default-rtdb.firebaseio.com)
#   FIREBASE_PROJECT_ID            (예: uniword-e3b0d)
#   FIREBASE_STORAGE_BUCKET        (예: uniword-e3b0d.firebasestorage.app)
#   FIREBASE_MESSAGING_SENDER_ID   (예: 925582403402)
#   FIREBASE_APP_ID
#   FIREBASE_MEASUREMENT_ID        (선택)
#
# Naver OAuth (https://developers.naver.com/apps):
#   NAVER_CLIENT_ID                (Client ID — 공개되어도 무관)
#   NAVER_CLIENT_SECRET            (절대 클라이언트로 노출되면 안 됨, 서버 함수만 접근)
#   NAVER_CALLBACK_URL             (선택, 미설정 시 origin/naver-callback.html 자동 생성)
#
# 추가 보안 권장 사항:
# 1. GCP Console → API Key → Application Restrictions → HTTP referrer 로 도메인 화이트리스트
#    (https://unws.netlify.app/*, http://localhost:8080/*)
# 2. Firebase Console → Authentication → Settings → 승인된 도메인에 unws.netlify.app 등록
# 3. Naver 개발자센터 → 서비스 URL / Callback URL 정확히 등록

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # CSP — Firebase Auth/Realtime DB, Google Fonts, Naver OAuth, 자기 자신 origin만 허용
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://apis.google.com https://*.firebaseapp.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' https://*.firebaseio.com https://*.firebaseapp.com https://*.googleapis.com https://*.naver.com https://openapi.naver.com https://nid.naver.com; frame-src https://*.firebaseapp.com https://accounts.google.com https://nid.naver.com; object-src 'none'; base-uri 'self'; form-action 'self' https://nid.naver.com"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/naver-callback.html"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
    X-Robots-Tag = "noindex, nofollow"

# Naver OAuth 콜백 페이지는 SPA fallback에서 제외되어야 함
[[redirects]]
  from = "/naver-callback.html"
  to = "/naver-callback.html"
  status = 200
  force = true

# Netlify Functions 경로
[[redirects]]
  from = "/.netlify/functions/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
